<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Monitor Laboral</title>

  <!-- Bootstrap -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
  />

  <!-- CSS propio -->
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <header class="app-header">
    <nav class="navbar navbar-expand-lg">
      <div class="container">
        <a class="navbar-brand fw-bold" href="#" id="homeLink">
          Monitor Laboral
        </a>

        <button
          id="themeToggle"
          class="btn btn-outline-light btn-sm rounded-pill"
          type="button"
        >
          🌙 Modo oscuro
        </button>
      </div>
    </nav>
  </header>

  <main class="container py-4">
    <!-- HOME -->
    <section id="homeSection">
      <div class="hero-card mb-4">
        <span class="badge rounded-pill text-bg-warning mb-2">
          Búsquedas automáticas
        </span>

        <h1 class="fw-bold mb-2">
          Monitor de concursos y ofertas laborales
        </h1>

        <p class="mb-0">
          Seleccioná tu área de interés para ver las ofertas disponibles.
        </p>
      </div>

      <div class="row g-3">
        <!-- Salud -->
        <div class="col-12 col-md-6 col-lg-3">
          <button class="area-card w-100" data-area="salud">
            <div class="area-icon">🏥</div>

            <h2>Salud</h2>

            <p>
              Ofertas privadas de técnico/a en esterilización, clínicas,
              sanatorios y centrales.
            </p>

            <span>Ver ofertas privadas</span>
          </button>
        </div>

        <!-- Química -->
        <div class="col-12 col-md-6 col-lg-3">
          <button class="area-card w-100" data-area="quimica">
            <div class="area-icon">⚗️</div>

            <h2>Química</h2>

            <p>
              Técnico químico, operario, producción, packaging y control de
              calidad.
            </p>

            <span>Ver ofertas</span>
          </button>
        </div>

        <!-- IT -->
        <div class="col-12 col-md-6 col-lg-3">
          <button class="area-card w-100" data-area="it">
            <div class="area-icon">💻</div>

            <h2>IT</h2>

            <p>
              Desarrollo trainee/junior y QA manual/automation trainee-junior.
            </p>

            <span>Ver ofertas</span>
          </button>
        </div>

        <!-- Concursos CABA -->
        <div class="col-12 col-md-6 col-lg-3">
          <button class="area-card w-100" data-area="concursos_caba">
            <div class="area-icon">🏛️</div>

            <h2>Concursos CABA</h2>

            <p>
              Hospitales GCBA: concursos de esterilización y técnico químico.
            </p>

            <span>Ver concursos</span>
          </button>
        </div>
      </div>
    </section>

    <!-- SECCIÓN DE RESULTADOS -->
    <section id="resultsSection" class="d-none">
      <div class="top-actions">
        <button id="backButton" class="back-home-btn" type="button">
          <span>←</span>
          <strong>Volver al inicio</strong>
        </button>
      </div>

      <div class="section-heading mb-3">
        <h1 id="sectionTitle" class="fw-bold mb-1"></h1>
        <p id="sectionDescription" class="mb-0"></p>
      </div>

      <div id="statusSummary" class="summary-grid mb-4"></div>

      <div id="filtersContainer" class="filters mb-4"></div>

      <div id="cardsContainer" class="row g-3"></div>

      <div id="paginationContainer" class="pagination-wrap"></div>
    </section>
  </main>

  <footer class="container pb-4">
    <p class="footer-text mb-0">
      Última actualización: <span id="lastUpdate">pendiente</span>
    </p>
  </footer>

  <!-- Bootstrap JS -->
  <script
    src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
  </script>

  <!-- JS propio -->
  <script src="app.js"></script>
</body>
</html>
